AllCops:
  NewCops: enable
  TargetRubyVersion: 3.3
  DisabledByDefault: true

Layout/LineLength:
  Max: 200

Metrics/ClassLength:
  Enabled: false

Metrics/MethodLength:
  Enabled: false

Metrics/AbcSize:
  Enabled: false

Metrics/CyclomaticComplexity:
  Enabled: false

Metrics/PerceivedComplexity:
  Enabled: false

Style/Documentation:
  Enabled: false
